networks:
  tapak-ocbc:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-service
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tapak-ocbc

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-service
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 10
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - tapak-ocbc

  postgres:
    image: postgres:18.3-alpine
    container_name: postgres-service
    restart: unless-stopped
    environment:
      POSTGRES_DB: tapak-ocbc
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: Secretpassword@123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./order-service/sql:/migrations:ro
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - tapak-ocbc

  redis:
    image: redis:8.6.1-alpine
    container_name: redis-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - tapak-ocbc

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy 
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - order-service/.env
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - tapak-ocbc
  
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy 
    ports:
      - "8081:8081"
    env_file:
      - payment-service/.env
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - tapak-ocbc
  
  inventory-worker:
    build:
      context: .
      dockerfile: inventory-worker/Dockerfile
    container_name: inventory-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - inventory-worker/.env
    networks:
      - tapak-ocbc

volumes:
  postgres-data: